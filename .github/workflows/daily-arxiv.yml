name: Daily arXiv Update

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Fetch window in days (only used when date is blank)"
        required: false
        default: "7"
      date:
        description: "Specific date to filter (YYYY-MM-DD). Leave blank to process the latest 7 dates."
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-filter:
    runs-on: ubuntu-latest
    env:
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
      LLM_MODEL: ${{ vars.LLM_MODEL }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore data from orphan branch
        run: |
          git fetch origin data 2>/dev/null || true
          if git rev-parse --verify origin/data >/dev/null 2>&1; then
            TMP=$(mktemp -d)
            git worktree add "$TMP" origin/data
            cp -r "$TMP/relevant" . 2>/dev/null || true
            cp -r "$TMP/trash" . 2>/dev/null || true
            cp -r "$TMP/data" . 2>/dev/null || true
            git worktree remove "$TMP"
            echo "Restored data from orphan branch"
          else
            echo "No data branch yet — first run"
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Fetch arXiv papers
        run: |
          uv run python -m src.main fetch --days ${{ github.event.inputs.days || '7' }}

      - name: Filter papers with LLM
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            uv run python -m src.main filter --date ${{ github.event.inputs.date }}
          else
            ls data/*.json 2>/dev/null | sort -r | head -7 | while read f; do
              d=$(basename "$f" .json)
              uv run python -m src.main filter --date "$d"
            done
          fi

      - name: Refilter unevaluated papers
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            uv run python -m src.main refilter --date ${{ github.event.inputs.date }} || true
          else
            ls relevant/*.json 2>/dev/null | sort -r | head -7 | while read f; do
              d=$(basename "$f" .json)
              uv run python -m src.main refilter --date "$d" || true
            done
          fi

      - name: Cleanup old trash
        run: uv run python -m src.main cleanup --keep 7

      - name: Generate dates index
        run: |
          python3 -c "
          import json, glob
          dates = sorted(set(
              f.split('/')[-1].replace('.json','')
              for f in glob.glob('relevant/*.json')
          ))
          with open('dates.json','w') as f:
              json.dump(dates[-90:], f)
          "

      - name: Push data to orphan data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DATA_DIR=$(mktemp -d)

          git worktree add "$DATA_DIR" --detach 2>/dev/null
          cd "$DATA_DIR"
          git checkout --orphan data
          git rm -rf . 2>/dev/null || true

          cp -r "$GITHUB_WORKSPACE/relevant" . 2>/dev/null || true
          cp -r "$GITHUB_WORKSPACE/trash" . 2>/dev/null || true
          cp -r "$GITHUB_WORKSPACE/data" . 2>/dev/null || true
          cp "$GITHUB_WORKSPACE/dates.json" . 2>/dev/null || true

          git add -A
          git diff --cached --quiet || git commit -m "data: update $(date +%Y-%m-%d)"
          git push origin data --force

          cd "$GITHUB_WORKSPACE"
          git worktree remove "$DATA_DIR"

      - name: Build docs and frontend
        run: |
          mkdir -p site
          cp -r site-ui/* site/
          uv run mkdocs build -d site/guide

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: fetch-and-filter
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
